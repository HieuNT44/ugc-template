# https://github.com/evilmartians/lefthook
# Stage all intended changes before commit (`git add -A`) when mixing staged/unstaged files.

assert_lefthook_installed: true

pre-commit:
  # Avoid `git stash create` failures on root commit or with unstaged changes
  skip_stash: true
  parallel: true
  commands:
    lint-staged:
      run: npx lint-staged

    typecheck:
      glob: "*.{ts,tsx}"
      run: npm run typecheck

    knip:
      glob: "*.{ts,tsx}"
      run: npm run knip -- --no-exit-code
      stage_fixed: true

# build runs in CI; pre-push keeps fast feedback via tests only
pre-push:
  parallel: true
  commands:
    test:
      run: npm run test -- --run

commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit {1}
